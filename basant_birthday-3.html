<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Basant 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --rose: #e8a0b4;
      --cream: #f5e6d3;
      --glow: rgba(201,168,76,0.35);
    }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Amiri', serif;
      position: relative;
    }

    /* Particle stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: var(--op, 0.8); transform: scale(1); }
    }

    /* Floating petals */
    .petal {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50% 0 50% 0;
      background: var(--rose);
      opacity: 0;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Main stage */
    #stage {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
      width: 100%;
    }

    /* Birthday greeting */
    #greeting {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      color: var(--gold);
      letter-spacing: 0.04em;
      text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(201,168,76,0.2);
      min-height: 1.4em;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.15em;
      direction: ltr;
      unicode-bidi: isolate;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px) scale(0.8);
      transition: none;
    }
    .char.visible {
      animation: charIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes charIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Poem container */
    #poem-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
    }

    .verse {
      opacity: 0;
      font-size: clamp(1.1rem, 3vw, 1.55rem);
      color: var(--cream);
      line-height: 1.9;
      text-shadow: 0 0 12px rgba(245,230,211,0.2);
      padding: 0.4rem 1.2rem;
      white-space: nowrap;
      position: relative;
      will-change: transform, opacity;
      direction: rtl;
      unicode-bidi: isolate;
    }
    .verse::before {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%) scaleX(0);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transition: transform 0.5s ease;
    }
    .verse.active::before {
      transform: translateX(-50%) scaleX(1);
    }

    /* From right */
    .verse.from-right {
      animation: fromRight 0.6s cubic-bezier(0.22,1,0.36,1) forwards,
                 exitRight 0.5s ease-in forwards var(--exit-delay, 1.5s);
    }
    @keyframes fromRight {
      from { opacity: 0; transform: translateX(120px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes exitRight {
      to { opacity: 0; transform: translateX(120px); }
    }

    /* From left */
    .verse.from-left {
      animation: fromLeft 0.6s cubic-bezier(0.22,1,0.36,1) forwards,
                 exitLeft 0.5s ease-in forwards var(--exit-delay, 1.5s);
    }
    @keyframes fromLeft {
      from { opacity: 0; transform: translateX(-120px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes exitLeft {
      to { opacity: 0; transform: translateX(-120px); }
    }

    /* From bottom */
    .verse.from-bottom {
      animation: fromBottom 0.6s cubic-bezier(0.22,1,0.36,1) forwards,
                 exitBottom 0.5s ease-in forwards var(--exit-delay, 1.5s);
    }
    @keyframes fromBottom {
      from { opacity: 0; transform: translateY(60px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes exitBottom {
      to { opacity: 0; transform: translateY(60px); }
    }

    /* Candle decoration */
    .candle-row {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
      font-size: 1.8rem;
      animation: bobble 2s ease-in-out infinite;
    }
    @keyframes bobble {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    /* Golden divider */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0.6rem auto 1rem;
    }

    /* Fade-in/out utility */
    .fade-out {
      animation: fadeOut 0.8s ease forwards !important;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.95); }
    }

    /* Start button overlay */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 1.4rem;
    }
    #start-overlay p {
      color: var(--cream);
      font-family: 'Amiri', serif;
      font-size: 1.1rem;
      opacity: 0.7;
    }
    #start-btn {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      color: #000;
      background: linear-gradient(135deg, var(--gold), #e8c96a, var(--gold));
      border: none;
      border-radius: 50px;
      padding: 0.75rem 2.8rem;
      cursor: pointer;
      box-shadow: 0 0 30px var(--glow), 0 4px 20px rgba(0,0,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 30px var(--glow); }
      50% { box-shadow: 0 0 60px var(--glow), 0 0 100px rgba(201,168,76,0.2); }
    }
    #start-btn:hover { transform: scale(1.06); }
    #start-overlay.hidden {
      animation: overlayFade 1s ease forwards;
    }
    @keyframes overlayFade {
      to { opacity: 0; pointer-events: none; }
    }

    /* Volume control */
    #vol-ctrl {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #vol-ctrl.show { opacity: 0.5; }
    #vol-ctrl:hover { opacity: 1; }
    #vol-ctrl span { font-size: 1.1rem; cursor: pointer; }
    #vol-slider {
      -webkit-appearance: none;
      width: 70px; height: 3px;
      border-radius: 3px;
      background: var(--gold);
      outline: none; cursor: pointer;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--gold);
    }
  </style>
</head>
<body>

<!-- Start overlay -->
<div id="start-overlay">
  <p>🌸 لبسنت، بكل المحبة 🌸</p>
  <button id="start-btn">✨ افتحي الهدية ✨</button>
</div>

<!-- Volume control -->
<div id="vol-ctrl">
  <span id="mute-btn">🔊</span>
  <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.7">
</div>

<div class="stars" id="stars"></div>
<div id="stage">
  <div id="greeting-wrap">
    <div class="candle-row" id="candles" style="opacity:0">🕯️🌸🎂🌸🕯️</div>
    <div class="divider" id="div1" style="opacity:0"></div>
    <div id="greeting"></div>
    <div class="divider" id="div2" style="opacity:0"></div>
  </div>

  <div id="poem-container">
    <div id="verse-display" class="verse"></div>
  </div>
</div>

<script>
  /* ════════════════════════════════════════════
     🎵  WEB AUDIO ENGINE
  ════════════════════════════════════════════ */
  let ctx, masterGain, muted = false;

  function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(ctx.destination);
  }

  /* ── Reverb (simple convolver) ── */
  function makeReverb(duration = 2.5, decay = 2) {
    const len = ctx.sampleRate * duration;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = buf.getChannelData(c);
      for (let i = 0; i < len; i++)
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
    const conv = ctx.createConvolver();
    conv.buffer = buf;
    return conv;
  }

  /* ── Reverb (simple convolver) ── */
  function makeReverb(duration = 2.5, decay = 2) {
    const len = ctx.sampleRate * duration;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = buf.getChannelData(c);
      for (let i = 0; i < len; i++)
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
    const conv = ctx.createConvolver();
    conv.buffer = buf;
    return conv;
  }

  /* ── ✨ Magical shimmer when verse appears — upgraded ── */
  function playVerseMagic() {
    const reverb = makeReverb(3, 1.6);
    reverb.connect(masterGain);

    // Fairy dust: fast random high sparkles
    for (let i = 0; i < 12; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 800 + Math.random() * 2400;
      const t = ctx.currentTime + Math.random() * 0.5;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.06 + Math.random() * 0.05, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.3 + Math.random() * 0.4);
      osc.connect(gain);
      gain.connect(reverb);
      osc.start(t);
      osc.stop(t + 0.8);
    }

    // Rising crystal arpeggio
    const crystalNotes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98];
    crystalNotes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.09;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.13, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
      osc.connect(gain);
      gain.connect(reverb);
      osc.start(t);
      osc.stop(t + 0.8);
    });

    // Deep resonant bell
    const bell = ctx.createOscillator();
    const bellGain = ctx.createGain();
    bell.type = 'sine';
    bell.frequency.setValueAtTime(2093, ctx.currentTime);
    bell.frequency.exponentialRampToValueAtTime(523, ctx.currentTime + 1.2);
    bellGain.gain.setValueAtTime(0.1, ctx.currentTime);
    bellGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.8);
    bell.connect(bellGain);
    bellGain.connect(reverb);
    bell.start();
    bell.stop(ctx.currentTime + 2);

    // Soft whoosh (filtered noise)
    const bufSize = ctx.sampleRate * 0.4;
    const noiseBuf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) nd[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 2000;
    noiseFilter.Q.value = 0.5;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.04, ctx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(reverb);
    noise.start();
    noise.stop(ctx.currentTime + 0.4);
  }

  /* ── 🎂 Birthday fanfare — upgraded ── */
  function playFanfare() {
    const reverb = makeReverb(4, 1.2);
    reverb.connect(masterGain);

    // Full Happy Birthday melody (2 phrases)
    const melody = [
      // Phrase 1
      {f:261.63,d:0.22},{f:261.63,d:0.11},{f:293.66,d:0.33},{f:261.63,d:0.33},
      {f:349.23,d:0.33},{f:329.63,d:0.66},
      // Phrase 2
      {f:261.63,d:0.22},{f:261.63,d:0.11},{f:293.66,d:0.33},{f:261.63,d:0.33},
      {f:392.00,d:0.33},{f:349.23,d:0.66},
      // Phrase 3 (higher)
      {f:261.63,d:0.22},{f:261.63,d:0.11},{f:523.25,d:0.33},{f:440.00,d:0.33},
      {f:349.23,d:0.22},{f:329.63,d:0.22},{f:293.66,d:0.66},
      // Final phrase
      {f:466.16,d:0.22},{f:466.16,d:0.11},{f:440.00,d:0.33},{f:349.23,d:0.33},
      {f:392.00,d:0.33},{f:349.23,d:1.0},
    ];

    let t = ctx.currentTime + 0.3;
    melody.forEach(({f, d}) => {
      // Main melody (triangle — warm)
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.22, t);
      gain.gain.setValueAtTime(0.22, t + d * 0.75);
      gain.gain.linearRampToValueAtTime(0, t + d);
      osc.connect(gain); gain.connect(reverb);
      osc.start(t); osc.stop(t + d + 0.05);

      // Harmony octave below (sine — soft)
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = f / 2;
      gain2.gain.setValueAtTime(0.08, t);
      gain2.gain.linearRampToValueAtTime(0, t + d);
      osc2.connect(gain2); gain2.connect(reverb);
      osc2.start(t); osc2.stop(t + d + 0.05);

      t += d;
    });

    // Grand chime cascade at the very start
    [261.63, 329.63, 392, 523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const st = ctx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0.12, st);
      g.gain.exponentialRampToValueAtTime(0.0001, st + 2.5);
      osc.connect(g); g.connect(reverb);
      osc.start(st); osc.stop(st + 2.6);
    });

    // Glittery finale sparkles at the end of melody
    const endT = ctx.currentTime + 0.3 + melody.reduce((s,n) => s + n.d, 0);
    for (let i = 0; i < 20; i++) {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 1000 + Math.random() * 3000;
      const st = endT + Math.random() * 1.5;
      g.gain.setValueAtTime(0.08, st);
      g.gain.exponentialRampToValueAtTime(0.0001, st + 0.4);
      osc.connect(g); g.connect(reverb);
      osc.start(st); osc.stop(st + 0.5);
    }
  }

  /* ── Volume / mute controls ── */
  function setupVolControl() {
    const slider = document.getElementById('vol-slider');
    const muteBtn = document.getElementById('mute-btn');
    const ctrl = document.getElementById('vol-ctrl');
    ctrl.classList.add('show');

    slider.addEventListener('input', () => {
      masterGain.gain.value = parseFloat(slider.value);
      muted = slider.value == 0;
      muteBtn.textContent = muted ? '🔇' : '🔊';
    });
    muteBtn.addEventListener('click', () => {
      muted = !muted;
      masterGain.gain.value = muted ? 0 : parseFloat(slider.value);
      muteBtn.textContent = muted ? '🔇' : '🔊';
    });
  }

  /* ════════════════════════════════════════════
     ⭐  STARS & PETALS
  ════════════════════════════════════════════ */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s; --delay:${Math.random()*5}s;
      --op:${0.4+Math.random()*0.6};
    `;
    starsEl.appendChild(s);
  }

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${5+Math.random()*7}px; height:${5+Math.random()*7}px;
      animation-duration:${6+Math.random()*8}s;
      animation-delay:${Math.random()*10}s;
      background: hsl(${340+Math.random()*30},${60+Math.random()*30}%,${70+Math.random()*20}%);
    `;
    document.body.appendChild(p);
  }

  /* ════════════════════════════════════════════
     🎬  MAIN FLOW
  ════════════════════════════════════════════ */
  const greetingEl = document.getElementById('greeting');
  const candlesEl  = document.getElementById('candles');
  const div1       = document.getElementById('div1');
  const div2       = document.getElementById('div2');
  const greetText  = "Happy Birthday Basant 🌸";

  function fadeIn(el, duration = 600) {
    el.style.transition = `opacity ${duration}ms ease`;
    el.style.opacity = '1';
  }

  async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function typeGreeting(targetEl) {
    const chars = [...greetText];
    for (let i = 0; i < chars.length; i++) {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = chars[i] === ' ' ? '\u00A0' : chars[i];
      targetEl.appendChild(span);
      await sleep(20);
      span.classList.add('visible');
      if (chars[i] !== ' ' && chars[i] !== '🌸') { /* no tick */ }
      await sleep(chars[i] === ' ' ? 40 : 65);
    }
  }

  async function runShow() {
    fadeIn(candlesEl, 800);
    await sleep(400);
    fadeIn(div1, 600);
    await sleep(300);
    fadeIn(div2, 600);

    await typeGreeting(greetingEl);
    await sleep(4000);

    document.getElementById('greeting-wrap').classList.add('fade-out');
    await sleep(800);
    document.getElementById('greeting-wrap').style.display = 'none';

    await startPoem();
  }

  /* ── Poem ── */
  const verses = [
    "ألا يا أُخَيَّةَ الروحِ، يا سِرَّ مهجتي",
    "ويا مُستراحَ القلبِ إن ضاقَ منزِلُهْ",
    "وجدتُكِ في دربِ الحياةِ مُؤانِسًا",
    "كأنَّكِ في ليلِ المخاوفِ مِشعَلُهْ",
    "إذا مسَّني حُزنٌ، أتيتِ مُواسِيًا",
    "كأنَّ يدًا من نورِ لطفٍ تُرتِّلُهْ",
    "تضمّينَ وجعي في هدوءٍ ورحمةٍ",
    "وتُخفينَ سرِّي، لا يُذاعُ ولا يُنقَلُهْ",
    "رفيقةُ دربي إن تعثَّرتُ مرّةً",
    "شدَدتِ يدي، ما خابَ يومًا تَواصُلُهْ",
    "نقاسِمُ أحلامًا، ونضحكُ صادقًا",
    "كأنَّ المنى في كفَّتينا نُداوِلُهْ",
    "إذا غابَ صوتُكِ، غابَ بعضُ سكينتي",
    "وإن حضرَتْ عادتْ إليَّ تأمُّلُهْ",
    "أحبُّكِ حبَّ الأختِ، بل أنتِ مهجتي",
    "وفي الصدرِ عهدٌ صادقٌ لا أُبدِّلُهْ",
    "سأبقى على وعدِ الصفاءِ محافظةً",
    "فلا ريحَ غدرٍ بينَنا قد تُزلزِلُهْ",
    "فيا نعمةَ اللهِ التي قد وهبتِ لي",
    "صديقةَ صدقٍ، في الشدائدِ أحمِلُهْ",
  ];

  const directions = ['from-right','from-left','from-bottom','from-right','from-left','from-bottom'];
  const poemContainer = document.getElementById('poem-container');
  const verseDisplay  = document.getElementById('verse-display');

  async function startPoem() {
    poemContainer.style.display = 'flex';
    await sleep(200);

    for (let i = 0; i < verses.length; i++) {
      const dir = directions[i % directions.length];
      await showVerse(verses[i], dir);
    }

    poemContainer.style.display = 'none';
    await showFinalGreeting();
  }

  function showVerse(text, dir) {
    return new Promise(async resolve => {
      verseDisplay.textContent = text;
      verseDisplay.className = 'verse active ' + dir;
      const exitDelay = 1500;
      verseDisplay.style.setProperty('--exit-delay', exitDelay + 'ms');

      playVerseMagic();

      await sleep(exitDelay + 500 + 300);
      verseDisplay.className = 'verse';
      await sleep(100);
      resolve();
    });
  }

  async function showFinalGreeting() {
    playFanfare();

    const wrap = document.createElement('div');
    wrap.id = 'greeting-wrap-final';
    wrap.style.cssText = 'opacity:0; text-align:center; transition: opacity 1s ease;';

    const c2 = document.createElement('div');
    c2.className = 'candle-row';
    c2.textContent = '🕯️🌸🎂🌸🕯️';
    c2.style.opacity = '1';

    const d1 = document.createElement('div');
    d1.className = 'divider';
    d1.style.opacity = '1';

    const g2 = document.createElement('div');
    g2.id = 'greeting2';
    g2.style.cssText = `
      font-family:'Dancing Script',cursive;
      font-size:clamp(2.4rem,7vw,4.5rem);
      color:var(--gold);
      text-shadow:0 0 30px var(--glow),0 0 60px rgba(201,168,76,0.2);
      display:flex; justify-content:center; flex-wrap:wrap; gap:0.15em;
      direction:ltr; unicode-bidi:isolate;
    `;

    const d2 = document.createElement('div');
    d2.className = 'divider';
    d2.style.opacity = '1';

    wrap.append(c2, d1, g2, d2);
    document.getElementById('stage').appendChild(wrap);

    await sleep(100);
    wrap.style.opacity = '1';
    await typeGreeting(g2);
  }

  /* ── Start button ── */
  document.getElementById('start-btn').addEventListener('click', () => {
    initAudio();
    setupVolControl();

    const overlay = document.getElementById('start-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.remove(), 1000);

    runShow();
  });
</script>
</body>
</html>
